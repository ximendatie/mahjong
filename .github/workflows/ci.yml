name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    name: Build and test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
